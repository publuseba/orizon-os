name: Lint Shell Scripts

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run non-strict ShellCheck Action
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
