-- ORIZON Conky Configuration
-- System monitor widget

conky.config = {
    update_interval = 2,
    cpu_avg_samples = 2,
    net_avg_samples = 2,
    out_to_console = false,
    override_utf8_locale = true,
    double_buffer = true,
    no_buffers = true,
    text_buffer_size = 32768,
    imlib_cache_size = 0,

    own_window = true,
    own_window_type = 'normal',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 180,
    own_window_colour = '05081a',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    border_width = 1,
    border_outer_margin = 10,
    default_color = '00d4ff',
    default_shade_color = '000000',
    default_outline_color = '00d4ff',
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    stippled_borders = 0,

    gap_x = 20,
    gap_y = 50,
    alignment = 'top_right',
    minimum_height = 320,
    minimum_width = 220,
    maximum_width = 220,

    use_xft = true,
    font = 'JetBrains Mono:size=9',
    xftalpha = 0.9,

    template0 = [[${color 00d4ff}${font JetBrains Mono:bold:size=9}]],
    template1 = [[${font}${color 88ccff}]],
    template2 = [[${color 00d4ff}]],
};

conky.text = [[
${template0}━━━━━━━━ ORIZON ━━━━━━━━
${template1}
${template0}SYSTEM${template1}
 Host   ${color ffffff}$nodename
 Kernel ${color ffffff}$kernel
 Uptime ${color ffffff}$uptime

${template0}CPU${template1}
 Usage  ${color ffffff}${cpu cpu0}%
 ${cpubar cpu0 6,210}
 Temp   ${color ffffff}${hwmon 0 temp 1}°C

${template0}MEMORY${template1}
 Used   ${color ffffff}$mem / $memmax
 ${membar 6,210}
 Swap   ${color ffffff}$swap / $swapmax

${template0}STORAGE${template1}
 Root   ${color ffffff}${fs_used /} / ${fs_size /}
 ${fs_bar 6,210 /}

${template0}NETWORK${template1}
 ↑ Up   ${color ffffff}${upspeed}
 ↓ Down ${color ffffff}${downspeed}

${template0}TOP PROCESSES${template1}
${color 00aaff}${top name 1} ${color ffffff}${top cpu 1}%
${color 00aaff}${top name 2} ${color ffffff}${top cpu 2}%
${color 00aaff}${top name 3} ${color ffffff}${top cpu 3}%

${template2}━━━━━━━━━━━━━━━━━━━━━━━━
${color 0088aa}${time %H:%M  |  %a %d %b}
]];
